<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sign in · Web Terminal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23c96342'/></svg>" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <div class="auth-card">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" width="28" height="28">
              <path d="M16 3.5c-1.6 4.2-3.7 6.4-7.9 7.9 4.2 1.6 6.4 3.7 7.9 7.9 1.6-4.2 3.7-6.4 7.9-7.9-4.2-1.6-6.4-3.7-7.9-7.9z" fill="currentColor"/>
              <path d="M22.5 19c-.7 1.9-1.7 2.9-3.6 3.6 1.9.7 2.9 1.7 3.6 3.6.7-1.9 1.7-2.9 3.6-3.6-1.9-.7-2.9-1.7-3.6-3.6z" fill="currentColor" opacity=".7"/>
            </svg>
          </div>
          <span class="brand-name">Web Terminal</span>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to access your remote shell.</p>

        {% if error %}
          <div class="alert alert-error" role="alert">{{ error }}</div>
        {% endif %}

        <form class="auth-form" method="post" autocomplete="off" novalidate>
          <label class="field">
            <span class="field-label">Username</span>
            <input
              type="text"
              name="username"
              autocomplete="username"
              autofocus
              required
              spellcheck="false"
              autocapitalize="off"
            />
          </label>

          <label class="field">
            <span class="field-label">Password</span>
            <input
              type="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </label>

          <button class="btn btn-primary" type="submit">Continue</button>
        </form>

        <p class="auth-hint">
          Credentials are generated on container start &mdash; check your
          <strong>Railway logs</strong> for the username and password.
        </p>
      </div>

      <p class="auth-footer">Styled after claude.ai · self-hosted</p>
    </main>
  </body>
</html>
